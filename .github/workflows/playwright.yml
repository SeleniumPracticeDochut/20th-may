name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        DOCTOR_EMAIL: ${{ secrets.DOCTOR_EMAIL }}
        DOCTOR_PASSWORD: ${{ secrets.DOCTOR_PASSWORD }}
        PATIENT_EMAIL: ${{ secrets.PATIENT_EMAIL }}
        PATIENT_PASSWORD: ${{ secrets.PATIENT_PASSWORD }}
        NURSE_EMAIL: ${{ secrets.NURSE_EMAIL }}
        NURSE_PASSWORD: ${{ secrets.NURSE_PASSWORD }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
